<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnmanuelyARM | Portfolio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --accent-color: #00d1ff;
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 3px solid rgba(0, 209, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 209, 255, 0.2);
            animation: spin 1s ease-in-out infinite;
            margin: 30px auto 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .container {
            text-align: center;
            border-left: 4px solid var(--accent-color);
            padding: 20px 40px;
            background: linear-gradient(90deg, rgba(0, 209, 255, 0.05) 0%, transparent 100%);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .status {
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(1.2);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div>

        <div class="container">
            <h1>Website personal</h1>
            <p><span class="dot"></span><span class="status">Este es mi sitio web personal. Gracias por mostrar
                    interés.</span></p>
            <p><span class="dot"></span><span class="status">Próximamente habrá más información aquí.</span></p>
            <p><span class="dot"></span><span class="status">Enmanueli A.R.M.</span></p>
        </div>
        <div class="loader"></div>
    </div>
</body>

</html>
